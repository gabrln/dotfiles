# ═══════════════════════════════════════════════════════════════════════════
#  CONFIGURAÇÃO OTIMIZADA DO HYPRLAND (CACHYOS + NOCTALIA)
# ═══════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════
#  MONITORES
# ═══════════════════════════════════════════════════════════════════════════
monitor=,1920x1080@60,auto,1

# ═══════════════════════════════════════════════════════════════════════════
#  VARIÁVEIS GLOBAIS
# ═══════════════════════════════════════════════════════════════════════════
$terminal    = kitty
$fileManager = thunar
$mainMod     = SUPER
$ipc         = qs -c noctalia-shell ipc call

# ─── Scratchpads ────────────────────────────────────────────────────────────
$scratchTerm    = kitty --class scratch_term
$scratchSysmon  = kitty --class scratch_sysmon -e btop

# ═══════════════════════════════════════════════════════════════════════════
#  VARIÁVEIS DE AMBIENTE
# ═══════════════════════════════════════════════════════════════════════════

# --- Otimização para Intel Iris Xe (i5-1135G7) ---
env = LIBVA_DRIVER_NAME,iHD
env = __GLX_VENDOR_LIBRARY_NAME,intel
env = INTEL_VAAPI_DRIVER,iHD

# --- Forçar Wayland em Toolkits ---
env = XDG_CURRENT_DESKTOP,Hyprland
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# --- Temas e Cursor ---
env = QS_ICON_THEME,Papirus
env = QT_QPA_PLATFORMTHEME=qt6ct
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24

# ═══════════════════════════════════════════════════════════════════════════
#  AUTOSTART
# ═══════════════════════════════════════════════════════════════════════════

# --- Essenciais do Sistema ---
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user start hyprland-session.target

# --- Clipboard Manager ---
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# --- Pré-inicializar scratchpads (aparecem instantaneamente no primeiro uso) ---
exec-once = $scratchTerm
exec-once = $scratchSysmon

# ═══════════════════════════════════════════════════════════════════════════
#  APARÊNCIA E COMPORTAMENTO
# ═══════════════════════════════════════════════════════════════════════════

general {
    gaps_in  = 5
    gaps_out = 5
    border_size = 2
}

decoration {
    rounding       = 8
    rounding_power = 2

    shadow {
        enabled      = true
        range        = 4
        render_power = 3
        color        = rgba(1a1a1aee)
    }

    blur {
        enabled   = true
        size      = 3
        passes    = 2
        vibrancy  = 0.1696
    }
}

animations {
    enabled = yes

    # --- Curvas de Bezier ---
    bezier = easeOutQuint,    0.23, 1,    0.32, 1
    bezier = easeInOutCubic,  0.65, 0.05, 0.36, 1
    bezier = linear,          0,    0,    1,    1
    bezier = almostLinear,    0.5,  0.5,  0.75, 1
    bezier = quick,           0.15, 0,    0.1,  1

    # --- Animações ---
    animation = global,         1, 10,   default
    animation = border,         1, 5.39, easeOutQuint
    animation = windows,        1, 4.79, easeOutQuint
    animation = windowsIn,      1, 4.1,  easeOutQuint, popin 87%
    animation = windowsOut,     1, 1.49, linear,       popin 87%
    animation = fadeIn,         1, 1.73, almostLinear
    animation = fadeOut,        1, 1.46, almostLinear
    animation = fade,           1, 3.03, quick
    animation = layers,         1, 3.81, easeOutQuint
    animation = layersIn,       1, 4,    easeOutQuint, fade
    animation = layersOut,      1, 1.5,  linear,       fade
    animation = fadeLayersIn,   1, 1.79, almostLinear
    animation = fadeLayersOut,  1, 1.39, almostLinear
    animation = workspaces,     1, 1.94, almostLinear, fade
    animation = workspacesIn,   1, 1.21, almostLinear, fade
    animation = workspacesOut,  1, 1.94, almostLinear, fade
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
}

# ═══════════════════════════════════════════════════════════════════════════
#  INPUT (TECLADO, MOUSE, TOUCHPAD)
# ═══════════════════════════════════════════════════════════════════════════

input {
    kb_layout  = br
    kb_variant =
    kb_model   =
    kb_options =
    kb_rules   =

    follow_mouse  = 1
    sensitivity   = -0.4
    accel_profile = flat

    touchpad {
        natural_scroll = false
    }
}

# ═══════════════════════════════════════════════════════════════════════════
#  KEYBINDINGS
#  Formato das descrições: #"texto" → aparece no keybind-cheatsheet do Noctalia
#  Categorias:             # N. NOME → agrupam os atalhos no cheatsheet
# ═══════════════════════════════════════════════════════════════════════════

# 1. APLICATIVOS
bind = $mainMod,       Return, exec, $terminal                    #"Terminal"
bind = $mainMod,       E,      exec, $fileManager                 #"Gerenciador de Arquivos"
bind = $mainMod,       B,      exec, firefox                      #"Navegador"
bind = $mainMod,       Q,      killactive,                        #"Fechar Janela"
bind = $mainMod CTRL,  X,      exec, $ipc sessionMenu toggle      #"Menu de Sessão"

# 2. JANELAS
bind = $mainMod,       W,    togglefloating,                      #"Flutuar / Fixar"
bind = $mainMod,       F,    fullscreen,                          #"Tela Cheia"
bind = $mainMod,       P,    pseudo,                              #"Pseudotile"
bind = $mainMod,       J,    togglesplit,                         #"Alternar Split"
bind = $mainMod,       left,  movefocus, l                        #"Foco ← "
bind = $mainMod,       right, movefocus, r                        #"Foco →"
bind = $mainMod,       up,    movefocus, u                        #"Foco ↑"
bind = $mainMod,       down,  movefocus, d                        #"Foco ↓"
bind = $mainMod SHIFT, left,  movewindow, l                       #"Mover Janela ←"
bind = $mainMod SHIFT, right, movewindow, r                       #"Mover Janela →"
bind = $mainMod SHIFT, up,    movewindow, u                       #"Mover Janela ↑"
bind = $mainMod SHIFT, down,  movewindow, d                       #"Mover Janela ↓"
bindm = $mainMod,      mouse:272, movewindow                      #"Arrastar Janela"
bindm = $mainMod,      mouse:273, resizewindow                    #"Redimensionar Janela"

# 3. GRUPOS
bind = $mainMod,       G,   togglegroup,                          #"Criar / Desfazer Grupo"
bind = $mainMod,       Tab, changegroupactive, f                  #"Próxima Aba do Grupo"
bind = $mainMod SHIFT, Tab, changegroupactive, b                  #"Aba Anterior do Grupo"
bind = $mainMod SHIFT, G,   moveoutofgroup,                       #"Tirar do Grupo"
bind = $mainMod CTRL,  G,   lockactivegroup, toggle               #"Travar Grupo"

# 4. SCRATCHPADS
bind = $mainMod,       T, togglespecialworkspace, scratch_term    #"Terminal Rápido"
bind = $mainMod,       Y, togglespecialworkspace, scratch_sysmon  #"Monitor do Sistema"

# 5. NOCTALIA SHELL
bind = $mainMod,       SPACE, exec, $ipc launcher toggle          #"Launcher"
bind = $mainMod,       S,     exec, $ipc controlCenter toggle     #"Central de Controle"
bind = $mainMod,       comma, exec, $ipc settings toggle          #"Configurações"
bind = $mainMod,       V,     exec, $ipc plugin:clipper toggle    #"Clipper"
bind = $mainMod,       F1,    exec, $ipc plugin:keybind-cheatsheet toggle #"Cheatsheet de Atalhos"

# Funções extras do Clipper
bind = $mainMod CTRL,  C, exec, $ipc plugin:clipper addSelectionToTodo     #"Seleção → Todo"
bind = $mainMod CTRL,  N, exec, $ipc plugin:clipper addSelectionToNoteCard #"Seleção → Nota"

# Clipboard fallback (sem Noctalia)
bind = $mainMod CTRL,  V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy #"Clipboard (fallback)"

# 6. CAPTURA DE TELA
bind = ,               Print,       exec, $ipc plugin:screenshot takeScreenshot region  #"Captura de Região → Clipboard"
bind = SHIFT,          Print,       exec, $ipc plugin:screenshot takeScreenshot screen  #"Captura de Tela Inteira"
bind = $mainMod,       Print,       exec, $ipc plugin:screenshot takeScreenshot window  #"Captura de Janela"

# 7. GRAVAÇÃO DE TELA
bind = $mainMod,       R,     exec, $ipc plugin:screen-recorder toggle  #"Gravar / Parar Gravação"

# 8. MÍDIA E HARDWARE
bindel = , XF86AudioRaiseVolume,  exec, $ipc volume increase    #"Volume +"
bindel = , XF86AudioLowerVolume,  exec, $ipc volume decrease    #"Volume -"
bindl  = , XF86AudioMute,         exec, $ipc volume muteOutput  #"Mudo"
bindel = , XF86MonBrightnessUp,   exec, $ipc brightness increase #"Brilho +"
bindel = , XF86MonBrightnessDown, exec, $ipc brightness decrease #"Brilho -"
bindl  = , XF86AudioNext,         exec, playerctl next           #"Próxima Faixa"
bindl  = , XF86AudioPause,        exec, playerctl play-pause     #"Play / Pause"
bindl  = , XF86AudioPlay,         exec, playerctl play-pause     #"Play / Pause"
bindl  = , XF86AudioPrev,         exec, playerctl previous       #"Faixa Anterior"

# 9. WORKSPACES
bind = $mainMod, 1, workspace, 1  #"Workspace 1"
bind = $mainMod, 2, workspace, 2  #"Workspace 2"
bind = $mainMod, 3, workspace, 3  #"Workspace 3"
bind = $mainMod, 4, workspace, 4  #"Workspace 4"
bind = $mainMod, 5, workspace, 5  #"Workspace 5"
bind = $mainMod, 6, workspace, 6  #"Workspace 6"
bind = $mainMod, 7, workspace, 7  #"Workspace 7"
bind = $mainMod, 8, workspace, 8  #"Workspace 8"
bind = $mainMod, 9, workspace, 9  #"Workspace 9"
bind = $mainMod, 0, workspace, 10 #"Workspace 10"

bind = $mainMod SHIFT, 1, movetoworkspace, 1  #"Mover para Workspace 1"
bind = $mainMod SHIFT, 2, movetoworkspace, 2  #"Mover para Workspace 2"
bind = $mainMod SHIFT, 3, movetoworkspace, 3  #"Mover para Workspace 3"
bind = $mainMod SHIFT, 4, movetoworkspace, 4  #"Mover para Workspace 4"
bind = $mainMod SHIFT, 5, movetoworkspace, 5  #"Mover para Workspace 5"
bind = $mainMod SHIFT, 6, movetoworkspace, 6  #"Mover para Workspace 6"
bind = $mainMod SHIFT, 7, movetoworkspace, 7  #"Mover para Workspace 7"
bind = $mainMod SHIFT, 8, movetoworkspace, 8  #"Mover para Workspace 8"
bind = $mainMod SHIFT, 9, movetoworkspace, 9  #"Mover para Workspace 9"
bind = $mainMod SHIFT, 0, movetoworkspace, 10 #"Mover para Workspace 10"

bind = $mainMod,       MINUS, togglespecialworkspace, magic        #"Workspace Magic"
bind = $mainMod SHIFT, MINUS, movetoworkspace, special:magic       #"Mover para Magic"
bind = $mainMod,       mouse_down, workspace, e+1                  #"Próximo Workspace"
bind = $mainMod,       mouse_up,   workspace, e-1                  #"Workspace Anterior"

# ═══════════════════════════════════════════════════════════════════════════
#  REGRAS DE JANELAS (sintaxe Hyprland 0.53+)
#  Formato: windowrule = match:prop valor, regra valor, regra valor, ...
# ═══════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
#  Scratchpads — flutuantes, centralizados e com tamanho fixo
# ─────────────────────────────────────────────────────────────────────────────
windowrule = match:class scratch_term,   float on, center on, size 900 550, workspace special:scratch_term silent
windowrule = match:class scratch_sysmon, float on, center on, size 1100 650, workspace special:scratch_sysmon silent

# ─────────────────────────────────────────────────────────────────────────────
#  Diálogos e Pop-ups Genéricos
# ─────────────────────────────────────────────────────────────────────────────
windowrule = match:title ^(Open File)$,   float on, center on
windowrule = match:title ^(Save As)$,     float on, center on
windowrule = match:title ^(File Upload)$, float on, center on

# Polkit / agentes de autenticação
windowrule = match:class ^(polkit-gnome-authentication-agent-1)$,       float on, center on
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, float on, center on

# ─────────────────────────────────────────────────────────────────────────────
#  Firefox
# ─────────────────────────────────────────────────────────────────────────────
windowrule = match:class ^(firefox)$ match:title ^(Picture-in-Picture)$,          float on, pin on
windowrule = match:class ^(firefox)$ match:title ^(Firefox — Sharing Indicator)$, float on
windowrule = match:class ^(firefox)$ match:title ^(About Mozilla Firefox)$,       float on, center on

# ─────────────────────────────────────────────────────────────────────────────
#  Thunar — janelas auxiliares flutuam
# ─────────────────────────────────────────────────────────────────────────────
windowrule = match:class ^(thunar)$ match:title ^(File Operation Progress)$,  float on, center on
windowrule = match:class ^(thunar)$ match:title ^(Confirm to replace files)$, float on, center on

# ─────────────────────────────────────────────────────────────────────────────
#  Steam
# ─────────────────────────────────────────────────────────────────────────────
windowrule = match:class ^(steam)$ match:title ^(Friends List)$,         float on
windowrule = match:class ^(steam)$ match:title ^(Steam Guard)$,          float on, center on
windowrule = match:class ^(steam)$ match:title ^(Screenshot Uploader)$,  float on, center on
windowrule = match:class ^(steam)$ match:title ^(Steam - Self Updater)$, float on, center on
windowrule = match:class ^(steam)$ match:title ^(Steam Settings)$,       float on, center on
# Notificações de canto (título vazio) — não entram no layout nem roubam foco
windowrule = match:class ^(steam)$ match:title ^$, float on

# ─────────────────────────────────────────────────────────────────────────────
#  Vesktop / Discord
# ─────────────────────────────────────────────────────────────────────────────
windowrule = match:class ^(vesktop)$ match:title ^(Discord Popout)$,            float on, center on
# Portal de transmissão — não divide a tela nem rouba foco
windowrule = match:class ^(vesktop)$ match:title ^(Discord Sharing Indicator)$, float on

# ─────────────────────────────────────────────────────────────────────────────
#  Miscelânea — apps utilitários que devem flutuar
# ─────────────────────────────────────────────────────────────────────────────
windowrule = match:class ^(pavucontrol)$,          float on, center on, size 700 450
windowrule = match:class ^(nm-connection-editor)$, float on, center on
windowrule = match:class ^(blueman-manager)$,      float on, center on, size 600 400

# ═══════════════════════════════════════════════════════════════════════════
#  REGRAS DE LAYERS
# ═══════════════════════════════════════════════════════════════════════════

layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha  = 0.5
  blur          = true
  blur_popups   = true
}

# ═══════════════════════════════════════════════════════════════════════════
#  IMPORTAR CORES DO NOCTALIA
# ═══════════════════════════════════════════════════════════════════════════
source = ~/.config/hypr/noctalia/noctalia-colors.conf
