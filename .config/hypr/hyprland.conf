# ═══════════════════════════════════════════════════════════════════════════
#  CONFIGURAÇÃO OTIMIZADA DO HYPRLAND (CACHYOS + NOCTALIA)
#  Versão: 0.53.0
# ═══════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════
#  MONITORES
# ═══════════════════════════════════════════════════════════════════════════
monitor=,1920x1080@60,auto,1  # Configuração automática de monitor - resolução 1920x1080 a 60Hz com escala 1

# ═══════════════════════════════════════════════════════════════════════════
#  VARIÁVEIS GLOBAIS
# ═══════════════════════════════════════════════════════════════════════════
$terminal    = kitty      # Emulador de terminal padrão
$fileManager = thunar     # Gerenciador de arquivos padrão
$browser     = firefox    # Navegador web padrão
$mainMod     = SUPER      # Tecla modificadora principal (tecla Windows)
$ipc         = qs -c noctalia-shell ipc call  # Comando base para comunicação IPC com Noctalia Shell

# ─── Scratchpads ────────────────────────────────────────────────────────────
$scratchTerm    = kitty --class scratch_term  # Terminal scratchpad com classe CSS específica
$scratchSysmon  = kitty --class scratch_sysmon --override initial_window_width=1280 --override initial_window_height=720 -e btop  # Monitor de sistema (btop) em scratchpad com dimensões customizadas

# ═══════════════════════════════════════════════════════════════════════════
#  VARIÁVEIS DE AMBIENTE
# ═══════════════════════════════════════════════════════════════════════════

# --- Otimização para Intel Iris Xe (i5-1135G7) ---
env = LIBVA_DRIVER_NAME,iHD  # Driver VA-API para aceleração de vídeo Intel (iHD = Intel HD Graphics driver)
env = __GLX_VENDOR_LIBRARY_NAME,intel  # Força uso da biblioteca GLX da Intel para renderização OpenGL
env = INTEL_VAAPI_DRIVER,iHD  # Driver VAAPI específico da Intel para decodificação de vídeo acelerada por hardware

# --- Toolkits ---
env = GDK_BACKEND,wayland,x11,*  # Prioriza Wayland para aplicativos GTK, com fallback para X11
env = QT_QPA_PLATFORM,wayland;xcb  # Plataforma Qt usa Wayland, com fallback para XCB (X11)
env = CLUTTER_BACKEND,wayland  # Backend Wayland para biblioteca gráfica Clutter

# --- XDG Specifications ---
env = XDG_CURRENT_DESKTOP,Hyprland  # Define desktop atual como Hyprland para aplicativos
env = XDG_SESSION_DESKTOP,Hyprland  # Define sessão de desktop como Hyprland
env = XDG_SESSION_TYPE,wayland  # Define tipo de sessão como Wayland (não X11)

# --- QT Variables ---
env = QT_AUTO_SCREEN_SCALE_FACTOR,1  # Habilita escalonamento automático para aplicativos Qt em monitores HiDPI
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1  # Desabilita decorações de janela do Qt (usa decorações do compositor)
env = QT_QPA_PLATFORMTHEME,qt5ct  # Define qt5ct como ferramenta de temas para Qt5
env = QT_QPA_PLATFORMTHEME,qt6ct  # Define qt6ct como ferramenta de temas para Qt6

# --- hyprland-qt-support ---
env = QT_QUICK_CONTROLS_STYLE,org.hyprland.style  # Estilo customizado do Hyprland para Qt Quick Controls

# --- firefox ---
env = MOZ_ENABLE_WAYLAND,1  # Habilita backend Wayland nativo no Firefox

# --- electron >28 apps (may help)
env = ELECTRON_OZONE_PLATFORM_HINT,auto  # Electron apps selecionam automaticamente Wayland quando disponível, senão X11

# --- Temas e Cursor ---
#env = QS_ICON_THEME,Papirus  # Tema de ícones (comentado - não está sendo usado)
env = XCURSOR_THEME,Bibata-Modern-Classic  # Tema de cursor para aplicativos X11/XWayland
env = XCURSOR_SIZE,24  # Tamanho do cursor em pixels para X11/XWayland
env = HYPRCURSOR_THEME,Bibata-Modern-Classic  # Tema de cursor nativo do Hyprland
env = HYPRCURSOR_SIZE,24  # Tamanho do cursor nativo do Hyprland em pixels

# ═══════════════════════════════════════════════════════════════════════════
#  AUTOSTART
# ═══════════════════════════════════════════════════════════════════════════

# --- Essenciais do Sistema ---
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP  # Importa variáveis de ambiente para serviços systemd do usuário
exec-once = dbus-update-activation-environment --systemd --all  # Atualiza ambiente DBus para ativação de serviços systemd
exec-once = systemctl --user start hyprland-session.target  # Inicia target systemd da sessão Hyprland

# --- Clipboard Manager ---
exec-once = wl-paste --type text  --watch cliphist store  # Monitora clipboard para texto e armazena histórico via cliphist
exec-once = wl-paste --type image --watch cliphist store  # Monitora clipboard para imagens e armazena histórico via cliphist

# --- Pré-inicializar scratchpads (aparecem instantaneamente no primeiro uso) ---
exec-once = $scratchTerm  # Inicia terminal scratchpad em background para acesso instantâneo
exec-once = $scratchSysmon  # Inicia monitor de sistema scratchpad em background para acesso instantâneo

# ═══════════════════════════════════════════════════════════════════════════
#  APARÊNCIA E COMPORTAMENTO
# ═══════════════════════════════════════════════════════════════════════════

general {
    gaps_in  = 5  # Espaçamento interno entre janelas em pixels
    gaps_out = 5  # Espaçamento externo entre janelas e bordas do monitor em pixels
    border_size = 2  # Largura da borda das janelas em pixels
    
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg  # Cor da borda da janela ativa (gradiente ciano-verde a 45 graus)
    col.inactive_border = rgba(595959aa)  # Cor da borda das janelas inativas (cinza semi-transparente)
    
    resize_on_border = false  # Desabilita redimensionamento ao arrastar borda da janela
    allow_tearing = false  # Desabilita screen tearing (previne rasgos visuais em movimento rápido)
    layout = dwindle  # Layout padrão de gerenciamento de janelas (dwindle = divisão dinâmica em espiral)
}

decoration {
    rounding       = 8  # Raio de arredondamento dos cantos das janelas em pixels
    rounding_power = 2  # Potência da curva de arredondamento (maior = cantos mais suaves)
    
    active_opacity = 1.0  # Opacidade das janelas ativas (1.0 = totalmente opaco)
    inactive_opacity = 1.0  # Opacidade das janelas inativas (1.0 = totalmente opaco)
    
    shadow {
        enabled      = true  # Habilita sombras sob as janelas
        range        = 4  # Distância de propagação da sombra em pixels
        render_power = 3  # Intensidade/suavidade da renderização da sombra (maior = mais suave)
        color        = rgba(1a1a1aee)  # Cor da sombra (preto semi-transparente)
    }
    
    blur {
        enabled   = true  # Habilita efeito de desfoque em janelas transparentes
        size      = 3  # Raio do desfoque em pixels
        passes    = 2  # Número de passes de renderização do blur (maior = mais suave mas mais custoso)
        vibrancy  = 0.1696  # Intensidade do efeito de vibração/saturação no blur
    }
}

animations {
    enabled = yes  # Habilita animações globalmente
    
    # --- Curvas de Bezier ---
    # Curvas de aceleração customizadas para diferentes tipos de animação
    bezier = easeOutQuint,    0.23, 1,    0.32, 1  # Desaceleração rápida no final
    bezier = easeInOutCubic,  0.65, 0.05, 0.36, 1  # Aceleração suave entrada/saída
    bezier = linear,          0,    0,    1,    1  # Velocidade constante
    bezier = almostLinear,    0.5,  0.5,  0.75, 1  # Quase linear com leve aceleração
    bezier = quick,           0.15, 0,    0.1,  1  # Movimento rápido e responsivo
    bezier = scratchIn,       0.05, 0.9,  0.1,  1.05  # Animação de entrada do scratchpad com leve bounce
    bezier = scratchOut,      0.3,  0,    0.8,  0.3  # Animação de saída do scratchpad suave
    
    # --- Animações ---
    # Formato: animation = nome, habilitado (0/1), duração (decissegundos), curva [, estilo]
    animation = global,         1, 10,   default  # Animação global padrão
    animation = border,         1, 5.39, easeOutQuint  # Animação da mudança de cor da borda
    animation = windows,        1, 4.79, easeOutQuint  # Animação de movimento de janelas
    animation = windowsIn,      1, 4.1,  easeOutQuint, popin 87%  # Janelas aparecem com efeito popin a 87% do tamanho
    animation = windowsOut,     1, 1.49, linear,       popin 87%  # Janelas desaparecem com efeito popout a 87% do tamanho
    animation = fadeIn,         1, 1.73, almostLinear  # Fade in de janelas
    animation = fadeOut,        1, 1.46, almostLinear  # Fade out de janelas
    animation = fade,           1, 3.03, quick  # Fade geral
    animation = layers,         1, 3.81, easeOutQuint  # Animação de layers (overlays, barras)
    animation = layersIn,       1, 4,    easeOutQuint, fade  # Layers aparecem com fade
    animation = layersOut,      1, 1.5,  linear,       fade  # Layers desaparecem com fade
    animation = fadeLayersIn,   1, 1.79, almostLinear  # Fade in específico para layers
    animation = fadeLayersOut,  1, 1.39, almostLinear  # Fade out específico para layers
    animation = workspaces,     1, 1.94, almostLinear, fade  # Transição entre workspaces com fade
    animation = workspacesIn,   1, 1.21, almostLinear, fade  # Workspace entrando com fade
    animation = workspacesOut,  1, 1.94, almostLinear, fade  # Workspace saindo com fade
    animation = specialWorkspace,    1, 3.5, scratchIn,  slidefadevert 20%  # Scratchpad desliza verticalmente 20% com fade
    animation = specialWorkspaceIn,  1, 3.5, scratchIn,  slidefadevert 20%  # Scratchpad entrando desliza do topo
    animation = specialWorkspaceOut, 1, 2.5, scratchOut, slidefadevert 20%  # Scratchpad saindo desliza para o topo
}

dwindle {
    pseudotile     = true  # Habilita pseudotiling - janelas flutuantes mantêm proporção ao serem tileadas
    preserve_split = true  # Mantém orientação do split ao mover janelas
}

master {
    new_status = master  # Novas janelas abrem como master (principal) no layout master-stack
}

misc {
    force_default_wallpaper = 0  # Desabilita wallpaper padrão do Hyprland (0 = sem wallpaper, -1 = aleatório)
    disable_hyprland_logo   = true  # Remove logo do Hyprland ao iniciar
    disable_splash_rendering = true  # Desabilita renderização da splash screen inicial
    vfr = true  # Variable Frame Rate - reduz taxa de atualização quando não há mudanças na tela (economiza energia)
    vrr = 2  # Variable Refresh Rate - 0=desligado, 1=sempre, 2=apenas em fullscreen (reduz input lag)
    mouse_move_enables_dpms = true  # Movimento do mouse reativa monitores em modo economia de energia (DPMS)
    focus_on_activate = false  # Janelas que solicitam ativação não roubam foco automaticamente
    initial_workspace_tracking = 0  # Desabilita rastreamento de workspace inicial de aplicativos
    middle_click_paste = false  # Desabilita colar texto com botão do meio do mouse
    enable_anr_dialog = true  # Habilita diálogo quando aplicativo não responde (Application Not Responding)
    allow_session_lock_restore = true  # Permite restaurar sessão após lock screen
    on_focus_under_fullscreen = 1  # Comportamento ao focar janela sob fullscreen - 1=levanta janela fullscreen
}

binds {
    pass_mouse_when_bound = false  # Eventos de mouse não passam para janela de fundo quando bind é ativado
}

cursor {
    sync_gsettings_theme = true  # Sincroniza tema do cursor com GSettings (GNOME/GTK)
    enable_hyprcursor = true  # Habilita sistema de cursor nativo do Hyprland
    inactive_timeout = 3  # Segundos de inatividade antes do cursor desaparecer
    hide_on_key_press = true  # Cursor desaparece ao digitar
    no_warps = true  # Desabilita warp do cursor ao focar janelas
}

# ═══════════════════════════════════════════════════════════════════════════
#  INPUT (TECLADO, MOUSE, TOUCHPAD)
# ═══════════════════════════════════════════════════════════════════════════

input {
    kb_layout  = br  # Layout do teclado (ABNT2 Brasileiro)
    kb_variant =  # Variante do layout (vazio = padrão)
    kb_model   =  # Modelo do teclado (vazio = autodetecção)
    kb_options =  # Opções extras do teclado (ex: caps:swapescape)
    kb_rules   =  # Regras customizadas do teclado
    
    repeat_rate = 50  # Taxa de repetição de teclas em caracteres por segundo
    repeat_delay = 300  # Delay inicial antes da repetição começar em milissegundos
    
    sensitivity   = -0.4  # Sensibilidade do mouse (-1.0 a 1.0, negativo = mais lento)
    accel_profile = flat  # Perfil de aceleração do mouse - flat=sem aceleração, adaptive=com aceleração
    
    numlock_by_default = true  # Habilita NumLock ao iniciar
    left_handed = false  # Modo para canhotos (inverte botões do mouse)
    follow_mouse = 1  # Foco segue o mouse - 0=não, 1=sempre, 2=apenas ao clicar, 3=apenas ao mover entre monitores
    float_switch_override_focus = false  # Não muda foco ao alternar entre janelas flutuantes e tileadas
    
    touchpad {
        natural_scroll = false  # Desabilita scroll natural (invertido) no touchpad
    }
}

# ═══════════════════════════════════════════════════════════════════════════
#  KEYBINDINGS
#  IMPORTANTE: windowrulev2 foi deprecado na versão 0.53.0
#  Use a nova sintaxe 'windowrule' com formato 'match:propriedade valor'
#  
#  Formato das descrições: #"texto" → aparece no keybind-cheatsheet do Noctalia
#  Categorias:             # N. NOME → agrupam os atalhos no cheatsheet
# ═══════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
#  1. APLICATIVOS
# ─────────────────────────────────────────────────────────────────────────────
bind = $mainMod,       Return, exec, $terminal                    #"Terminal"
bind = $mainMod,       E,      exec, $fileManager                 #"Gerenciador de Arquivos"
bind = $mainMod,       B,      exec, $browser                     #"Navegador"
bind = $mainMod,       Q,      killactive,                        #"Fechar Janela"
bind = $mainMod CTRL,  X,      exec, $ipc sessionMenu toggle      #"Menu de Sessão"

# ─────────────────────────────────────────────────────────────────────────────
#  2. JANELAS
# ─────────────────────────────────────────────────────────────────────────────
bind = $mainMod,       W,    togglefloating,                      #"Flutuar / Fixar"
bind = $mainMod,       F,    fullscreen,                          #"Tela Cheia"
bind = $mainMod,       P,    pseudo,                              #"Pseudotile"
bind = $mainMod,       J,    togglesplit,                         #"Alternar Split"
bind = $mainMod,       left,  movefocus, l                        #"Foco ← "
bind = $mainMod,       right, movefocus, r                        #"Foco →"
bind = $mainMod,       up,    movefocus, u                        #"Foco ↑"
bind = $mainMod,       down,  movefocus, d                        #"Foco ↓"
bind = $mainMod SHIFT, left,  movewindow, l                       #"Mover Janela ←"
bind = $mainMod SHIFT, right, movewindow, r                       #"Mover Janela →"
bind = $mainMod SHIFT, up,    movewindow, u                       #"Mover Janela ↑"
bind = $mainMod SHIFT, down,  movewindow, d                       #"Mover Janela ↓"
bindm = $mainMod,      mouse:272, movewindow                      #"Arrastar Janela"
bindm = $mainMod,      mouse:273, resizewindow                    #"Redimensionar Janela"

# ─────────────────────────────────────────────────────────────────────────────
#  3. GRUPOS
# ─────────────────────────────────────────────────────────────────────────────
bind = $mainMod,       G,   togglegroup,                          #"Criar / Desfazer Grupo"
bind = $mainMod,       Tab, changegroupactive, f                  #"Próxima Aba do Grupo"
bind = $mainMod SHIFT, Tab, changegroupactive, b                  #"Aba Anterior do Grupo"
bind = $mainMod SHIFT, G,   moveoutofgroup,                       #"Tirar do Grupo"
bind = $mainMod CTRL,  G,   lockactivegroup, toggle               #"Travar Grupo"

# ─────────────────────────────────────────────────────────────────────────────
#  4. SCRATCHPADS
# ─────────────────────────────────────────────────────────────────────────────
bind = $mainMod, T, exec, ~/.config/hypr/scripts/scratch-term.sh    #"Terminal Rápido"
bind = $mainMod, Y, exec, ~/.config/hypr/scripts/scratch-sysmon.sh  #"Monitor do Sistema"

# ─────────────────────────────────────────────────────────────────────────────
#  5. NOCTALIA SHELL
# ─────────────────────────────────────────────────────────────────────────────
bind = $mainMod,       SPACE, exec, $ipc launcher toggle          #"Launcher"
bind = $mainMod,       S,     exec, $ipc controlCenter toggle     #"Central de Controle"
bind = $mainMod,       comma, exec, $ipc settings toggle          #"Configurações"
bind = $mainMod,       V,     exec, $ipc plugin:clipper toggle    #"Clipper"
bind = $mainMod,       F1,    exec, $ipc plugin:keybind-cheatsheet toggle #"Cheatsheet de Atalhos"
bind = $mainMod CTRL,  N, exec, qs -c noctalia-shell ipc call plugin togglePanel notes-scratchpad #"Seleção → Nota"
bind = $mainMod CTRL,  V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy #"Clipboard (fallback)"

# ─────────────────────────────────────────────────────────────────────────────
#  6. CAPTURA DE TELA
# ─────────────────────────────────────────────────────────────────────────────
bind = ,               Print,       exec, $ipc plugin:screenshot takeScreenshot region  #"Captura de Região → Clipboard"
bind = SHIFT,          Print,       exec, $ipc plugin:screenshot takeScreenshot screen  #"Captura de Tela Inteira"
bind = $mainMod,       Print,       exec, $ipc plugin:screenshot takeScreenshot window  #"Captura de Janela"

# ─────────────────────────────────────────────────────────────────────────────
#  7. GRAVAÇÃO DE TELA
# ─────────────────────────────────────────────────────────────────────────────
bind = $mainMod,       R,     exec, $ipc plugin:screen-recorder toggle  #"Gravar / Parar Gravação"

# ─────────────────────────────────────────────────────────────────────────────
#  8. MÍDIA E HARDWARE
# ─────────────────────────────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, $ipc volume increase    #"Volume +"
bindel = , XF86AudioLowerVolume,  exec, $ipc volume decrease    #"Volume -"
bindl  = , XF86AudioMute,         exec, $ipc volume muteOutput  #"Mudo"
bindel = , XF86MonBrightnessUp,   exec, $ipc brightness increase #"Brilho +"
bindel = , XF86MonBrightnessDown, exec, $ipc brightness decrease #"Brilho -"
bindl  = , XF86AudioNext,         exec, playerctl next           #"Próxima Faixa"
bindl  = , XF86AudioPause,        exec, playerctl play-pause     #"Play / Pause"
bindl  = , XF86AudioPlay,         exec, playerctl play-pause     #"Play / Pause"
bindl  = , XF86AudioPrev,         exec, playerctl previous       #"Faixa Anterior"

# ─────────────────────────────────────────────────────────────────────────────
#  9. WORKSPACES
# ─────────────────────────────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1  #"Workspace 1"
bind = $mainMod, 2, workspace, 2  #"Workspace 2"
bind = $mainMod, 3, workspace, 3  #"Workspace 3"
bind = $mainMod, 4, workspace, 4  #"Workspace 4"
bind = $mainMod, 5, workspace, 5  #"Workspace 5"
bind = $mainMod, 6, workspace, 6  #"Workspace 6"
bind = $mainMod, 7, workspace, 7  #"Workspace 7"
bind = $mainMod, 8, workspace, 8  #"Workspace 8"
bind = $mainMod, 9, workspace, 9  #"Workspace 9"
bind = $mainMod, 0, workspace, 10 #"Workspace 10"

bind = $mainMod SHIFT, 1, movetoworkspace, 1  #"Mover para Workspace 1"
bind = $mainMod SHIFT, 2, movetoworkspace, 2  #"Mover para Workspace 2"
bind = $mainMod SHIFT, 3, movetoworkspace, 3  #"Mover para Workspace 3"
bind = $mainMod SHIFT, 4, movetoworkspace, 4  #"Mover para Workspace 4"
bind = $mainMod SHIFT, 5, movetoworkspace, 5  #"Mover para Workspace 5"
bind = $mainMod SHIFT, 6, movetoworkspace, 6  #"Mover para Workspace 6"
bind = $mainMod SHIFT, 7, movetoworkspace, 7  #"Mover para Workspace 7"
bind = $mainMod SHIFT, 8, movetoworkspace, 8  #"Mover para Workspace 8"
bind = $mainMod SHIFT, 9, movetoworkspace, 9  #"Mover para Workspace 9"
bind = $mainMod SHIFT, 0, movetoworkspace, 10 #"Mover para Workspace 10"

bind = $mainMod,       MINUS, togglespecialworkspace, magic        #"Workspace Magic"
bind = $mainMod SHIFT, MINUS, movetoworkspace, special:magic       #"Mover para Magic"
bind = $mainMod,       mouse_down, workspace, e+1                  #"Próximo Workspace"
bind = $mainMod,       mouse_up,   workspace, e-1                  #"Workspace Anterior"

# ═══════════════════════════════════════════════════════════════════════════
#  REGRAS DE JANELAS
#  VERSÃO 0.53.0+: windowrulev2 está DEPRECADO
#  Use sintaxe: windowrule = match:propriedade valor, regra valor, regra valor
#  Ou formato de bloco {} para regras complexas
# ═══════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
#  Scratchpads - janelas flutuantes centralizadas em workspaces especiais
# ─────────────────────────────────────────────────────────────────────────────
windowrule = match:class scratch_term,   float on, center on, workspace special:scratch_term silent  # Terminal scratchpad flutua centralizado
windowrule = match:class scratch_term,   size 1280 720  # Dimensões fixas do terminal scratchpad
windowrule = match:class scratch_sysmon, float on, center on, workspace special:scratch_sysmon silent  # Monitor de sistema scratchpad flutua centralizado
windowrule = match:class scratch_sysmon, size 1280 720  # Dimensões fixas do monitor de sistema scratchpad

# ─────────────────────────────────────────────────────────────────────────────
#  Diálogos e Pop-ups Genéricos - janelas de sistema flutuantes
# ─────────────────────────────────────────────────────────────────────────────
windowrule = match:title ^(Open File)$,   float on, center on  # Diálogo de abrir arquivo flutua centralizado
windowrule = match:title ^(Save As)$,     float on, center on  # Diálogo de salvar arquivo flutua centralizado
windowrule = match:title ^(File Upload)$, float on, center on  # Diálogo de upload de arquivo flutua centralizado

# Polkit / agentes de autenticação - diálogos de senha do sistema
windowrule = match:class ^(polkit-gnome-authentication-agent-1)$,       float on, center on  # Agente de autenticação GNOME flutua centralizado
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, float on, center on  # Agente de autenticação KDE flutua centralizado

# ─────────────────────────────────────────────────────────────────────────────
#  Firefox - regras específicas para navegador
# ─────────────────────────────────────────────────────────────────────────────
windowrule = match:class ^(firefox)$ match:title ^(Picture-in-Picture)$,          float on, pin on  # Picture-in-Picture flutua e fica pinado em todos workspaces
windowrule = match:class ^(firefox)$ match:title ^(Firefox — Sharing Indicator)$, float on  # Indicador de compartilhamento de tela flutua
windowrule = match:class ^(firefox)$ match:title ^(About Mozilla Firefox)$,       float on, center on  # Janela "Sobre o Firefox" flutua centralizada

# ─────────────────────────────────────────────────────────────────────────────
#  POSITION - posicionamento específico de janelas
# ─────────────────────────────────────────────────────────────────────────────
windowrule = match:class ([Tt]hunar) match:title negative:(.*[Tt]hunar.*), center on  # Diálogos do Thunar (exceto janela principal) centralizados
windowrule = match:title ^(Picture-in-Picture)$, move 72% 7%  # Picture-in-Picture posicionado no canto superior direito

# ─────────────────────────────────────────────────────────────────────────────
#  Thunar - gerenciador de arquivos auxiliar
# ─────────────────────────────────────────────────────────────────────────────
windowrule = match:class ^(thunar)$ match:title ^(File Operation Progress)$,  float on, center on  # Barra de progresso de operações flutua centralizada
windowrule = match:class ^(thunar)$ match:title ^(Confirm to replace files)$, float on, center on  # Confirmação de substituição flutua centralizada

# ─────────────────────────────────────────────────────────────────────────────
#  Float popups and dialogue - popups diversos que devem flutuar
# ─────────────────────────────────────────────────────────────────────────────
windowrule = match:class ^(com.heroicgameslauncher.hgl)$ match:title negative:(Heroic Games Launcher), float on  # Popups do Heroic Games exceto janela principal
windowrule = match:class ^([Ss]team)$ match:title negative:^([Ss]team)$, float on  # Popups do Steam exceto janela principal
windowrule = match:class ([Tt]hunar) match:title negative:(.*[Tt]hunar.*), float on  # Popups do Thunar exceto janela principal

# ─────────────────────────────────────────────────────────────────────────────
#  Vesktop / Discord - cliente Discord
# ─────────────────────────────────────────────────────────────────────────────
windowrule = match:class ^(vesktop)$ match:title ^(Discord Popout)$,            float on, center on  # Popouts do Discord flutuam centralizados
windowrule = match:class ^(vesktop)$ match:title ^(Discord Sharing Indicator)$, float on  # Indicador de compartilhamento do Discord flutua

# ─────────────────────────────────────────────────────────────────────────────
#  Miscelânea - aplicativos utilitários diversos
# ─────────────────────────────────────────────────────────────────────────────
windowrule = match:class ^(pavucontrol)$,          float on, center on, size 700 450  # Controle de volume PulseAudio flutua com tamanho fixo
windowrule = match:class ^(nm-connection-editor)$, float on, center on  # Editor de conexões NetworkManager flutua centralizado
windowrule = match:class ^(blueman-manager)$,      float on, center on, size 600 400  # Gerenciador Bluetooth flutua com tamanho fixo

# ─────────────────────────────────────────────────────────────────────────────
#  Regras em formato de bloco - sintaxe avançada para múltiplas propriedades
# ─────────────────────────────────────────────────────────────────────────────
windowrule {
    name = Picture-in-Picture  # Identificador da regra para Picture-in-Picture
    match:title = ^(Picture-in-Picture)$  # Aplica a janelas com título Picture-in-Picture
    float = on  # Janela flutua
    move = 72% 7%  # Posição no canto superior direito (72% horizontal, 7% vertical)
    opacity = 0.95 0.75  # Opacidade 95% ativa, 75% inativa
    pin = on  # Janela pinada em todos workspaces
    keep_aspect_ratio = on  # Mantém proporção ao redimensionar
    size = (monitor_w*0.3) (monitor_h*0.3)  # Tamanho 30% da largura e altura do monitor
}

windowrule {
    name = Thunar-Progress-bar  # Identificador da regra para barra de progresso do Thunar
    match:class = ^(thunar)$  # Aplica a janelas do Thunar
    match:title = ^(File Operation Progress)$  # Apenas barra de progresso de operações
    float = on  # Janela flutua
    center = on  # Centralizada na tela
    size = (monitor_w*0.26) (monitor_h*0.18)  # Tamanho 26% largura x 18% altura do monitor
}

# ═══════════════════════════════════════════════════════════════════════════
#  REGRAS DE LAYERS
#  Aplicam-se a overlays como barras de status, notificações e menus
# ═══════════════════════════════════════════════════════════════════════════

# Formato de bloco para layerrule - sintaxe 0.53.0+
layerrule {
  name = noctalia  # Identificador da regra para Noctalia Shell
  match:namespace = noctalia-background-.*$  # Aplica a todos layers de background do Noctalia (regex)
  ignore_alpha  = 0.5  # Ignora alpha channel abaixo de 0.5 para blur (otimização)
  blur          = true  # Habilita blur no layer
  blur_popups   = true  # Habilita blur também em popups do layer
}

# ═══════════════════════════════════════════════════════════════════════════
#  IMPORTAR CORES DO NOCTALIA
#  Arquivo gerado automaticamente pelo Noctalia Shell com esquema de cores
# ═══════════════════════════════════════════════════════════════════════════
source = ~/.config/hypr/noctalia/noctalia-colors.conf
