# ═══════════════════════════════════════════════════════════════════════════
#  CONFIGURAÇÃO OTIMIZADA DO HYPRLAND (CACHYOS)
#  Versão: 0.53.0
#  Stack: Waybar + Rofi + Wlogout + Mako
# ═══════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════
#  MONITORES
# ═══════════════════════════════════════════════════════════════════════════
monitor=,1920x1080@60,auto,1

# ═══════════════════════════════════════════════════════════════════════════
#  VARIÁVEIS GLOBAIS
# ═══════════════════════════════════════════════════════════════════════════
$terminal    = kitty
$fileManager = thunar
$browser     = firefox
$browsers    = brave
$mainMod     = SUPER
$scriptsDir  = ~/.config/hypr/scripts

# ═══════════════════════════════════════════════════════════════════════════
#  VARIÁVEIS DE AMBIENTE
# ═══════════════════════════════════════════════════════════════════════════

env = LIBVA_DRIVER_NAME,iHD
env = WLR_RENDERER,vulkan
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = CLUTTER_BACKEND,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt6ct
env = MOZ_ENABLE_WAYLAND,1
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24

# ═══════════════════════════════════════════════════════════════════════════
#  AUTOSTART
# ═══════════════════════════════════════════════════════════════════════════

exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd --all
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = $scriptsDir/MagicMonitor.sh
exec-once = mako
exec-once = waybar
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ═══════════════════════════════════════════════════════════════════════════
#  APARÊNCIA E COMPORTAMENTO
# ═══════════════════════════════════════════════════════════════════════════

general {
    gaps_in  = 5
    gaps_out = 8
    border_size = 0
    col.active_border = rgba(ffffffee) rgba(f2f2f2ff) 45deg
    col.inactive_border = rgba(828282ff)
    resize_on_border = false
    allow_tearing = true
    layout = dwindle
}

decoration {
    rounding       = 5
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled      = false
        range        = 4
        render_power = 3
        color        = rgba(ffffffee)
    }
    
    blur {
        enabled   = true
        size      = 1
        passes    = 4
        vibrancy  = 4
    }
}

animations {
    enabled = yes
    
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1
	# animation = workspaces, 1, 8, default
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 3.94, default, slide
    animation = workspacesIn, 1, 3.21, default, slide
    animation = workspacesOut, 1, 3.94, default, slide
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    disable_splash_rendering = true
    vfr = true
    vrr = 2
    mouse_move_enables_dpms = true
    focus_on_activate = false
    initial_workspace_tracking = 0
    middle_click_paste = true
    enable_anr_dialog = true
    allow_session_lock_restore = true
    on_focus_under_fullscreen = 1
}

binds {
    pass_mouse_when_bound = false
}

cursor {
    sync_gsettings_theme = true
    enable_hyprcursor = true
    inactive_timeout = 3
    hide_on_key_press = true
    no_warps = true
}

# ═══════════════════════════════════════════════════════════════════════════
#  INPUT
# ═══════════════════════════════════════════════════════════════════════════

input {
    kb_layout  = br
    kb_variant =
    kb_model   =
    kb_options =
    kb_rules   =
    repeat_rate = 50
    repeat_delay = 300
    sensitivity   = -0.4
    accel_profile = flat
    numlock_by_default = true
    left_handed = false
    follow_mouse = 1
    float_switch_override_focus = false
    
    touchpad {
        natural_scroll = false
    }
}

# ═══════════════════════════════════════════════════════════════════════════
#  KEYBINDINGS
# ═══════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
#  1. APLICATIVOS
# ─────────────────────────────────────────────────────────────────────────────
bind = $mainMod,       Return, exec, $terminal                    #"Terminal"
bind = $mainMod,       E,      exec, $fileManager                 #"Gerenciador de Arquivos"
bind = $mainMod,       B,      exec, $browser                     #"Navegador"
bind = $mainMod SHIFT, B,      exec, $browsers                    #"Navegador Secundário"
bind = $mainMod,       Q,      killactive,                        #"Fechar Janela"
bind = $mainMod CTRL,  X,      exec, wlogout                      #"Menu de Sessão"

# ─── WebApps ────────────────────────────────────────────────────────────────
bind = $mainMod SHIFT, Y, exec, brave --app=https://youtube.com                           #"YouTube"
bind = $mainMod SHIFT, A, exec, brave --app=https://gemini.google.com/gem/coding-partner  #"IA Gemini"
bind = $mainMod SHIFT, D, exec, brave --app=http://0.0.0.0:3000/                          #"DockerHand"
bind = $mainMod SHIFT, M, exec, brave --app=http://0.0.0.0:23333/                         #"MCSManager"
bind = $mainMod SHIFT, N, exec, brave --app=http://0.0.0.0:3001/                          #"Ntopng"

# ─────────────────────────────────────────────────────────────────────────────
#  2. GERENCIAMENTO DE JANELAS
# ─────────────────────────────────────────────────────────────────────────────
bind = $mainMod,       SPACE, togglefloating,                     #"Flutuar / Fixar"
bind = $mainMod,       F,     fullscreen,                         #"Tela Cheia"
bind = $mainMod,       P,     pseudo,                             #"Pseudotile"
bind = $mainMod,       J,     togglesplit,                        #"Alternar Split"

bind = $mainMod,       left,  movefocus, l                        #"Foco ←"
bind = $mainMod,       right, movefocus, r                        #"Foco →"
bind = $mainMod,       up,    movefocus, u                        #"Foco ↑"
bind = $mainMod,       down,  movefocus, d                        #"Foco ↓"

bind = $mainMod SHIFT, left,  movewindow, l                       #"Mover Janela ←"
bind = $mainMod SHIFT, right, movewindow, r                       #"Mover Janela →"
bind = $mainMod SHIFT, up,    movewindow, u                       #"Mover Janela ↑"
bind = $mainMod SHIFT, down,  movewindow, d                       #"Mover Janela ↓"

bind = $mainMod CTRL, left,  resizeactive, -40 0                  #"Redimensionar ←"
bind = $mainMod CTRL, right, resizeactive, 40 0                   #"Redimensionar →"
bind = $mainMod CTRL, up,    resizeactive, 0 -40                  #"Redimensionar ↑"
bind = $mainMod CTRL, down,  resizeactive, 0 40                   #"Redimensionar ↓"

bindm = $mainMod,      mouse:272, movewindow                      #"Arrastar Janela"
bindm = $mainMod,      mouse:273, resizewindow                    #"Redimensionar Janela"

# ─────────────────────────────────────────────────────────────────────────────
#  3. GRUPOS (TABS)
# ─────────────────────────────────────────────────────────────────────────────
bind = $mainMod,       G,   togglegroup,                          #"Criar / Desfazer Grupo"
bind = $mainMod,       Tab, changegroupactive, f                  #"Próxima Aba do Grupo"
bind = $mainMod SHIFT, Tab, changegroupactive, b                  #"Aba Anterior do Grupo"
bind = $mainMod SHIFT, G,   moveoutofgroup,                       #"Tirar do Grupo"
bind = $mainMod CTRL,  G,   lockactivegroup, toggle               #"Travar Grupo"

# ─────────────────────────────────────────────────────────────────────────────
#  4. SCRATCHPADS
# ─────────────────────────────────────────────────────────────────────────────
bind = $mainMod, T, togglespecialworkspace, terminal              #"Terminal Dropdown"

# ─────────────────────────────────────────────────────────────────────────────
#  5. LAUNCHERS E UTILIDADES
# ─────────────────────────────────────────────────────────────────────────────
bind = $mainMod, D, exec, rofi -show drun                                                                #"Launcher"
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -p "Área de Transferência" | cliphist decode | wl-copy  #"Clipboard"

# ─────────────────────────────────────────────────────────────────────────────
#  6. CAPTURA DE TELA
# ─────────────────────────────────────────────────────────────────────────────
bind = $mainMod,            Print, exec, $scriptsDir/ScreenShot.sh --now    #"Screenshot Agora"
bind = $mainMod SHIFT,      Print, exec, $scriptsDir/ScreenShot.sh --area   #"Screenshot Área"
bind = $mainMod CTRL,       Print, exec, $scriptsDir/ScreenShot.sh --in5    #"Screenshot em 5s"
bind = $mainMod CTRL SHIFT, Print, exec, $scriptsDir/ScreenShot.sh --in10   #"Screenshot em 10s"
bind = ALT,                 Print, exec, $scriptsDir/ScreenShot.sh --active #"Screenshot Janela Ativa"

# ─────────────────────────────────────────────────────────────────────────────
#  7. MÍDIA E HARDWARE
# ─────────────────────────────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+        #"Volume +"
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-        #"Volume -"
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle       #"Mudo Saída"
bind   = $mainMod, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle     #"Mudo Entrada"
bindel = , XF86MonBrightnessUp,   exec, brightnessctl s 5%+                               #"Brilho +"
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-                               #"Brilho -"
bindl  = , XF86AudioNext,         exec, playerctl next                                    #"Próxima Faixa"
bindl  = , XF86AudioPause,        exec, playerctl play-pause                              #"Play / Pause"
bindl  = , XF86AudioPlay,         exec, playerctl play-pause                              #"Play / Pause"
bindl  = , XF86AudioPrev,         exec, playerctl previous                                #"Faixa Anterior"

# ─────────────────────────────────────────────────────────────────────────────
#  8. WORKSPACES
# ─────────────────────────────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1  #"Workspace 1"
bind = $mainMod, 2, workspace, 2  #"Workspace 2"
bind = $mainMod, 3, workspace, 3  #"Workspace 3"
bind = $mainMod, 4, workspace, 4  #"Workspace 4"
bind = $mainMod, 5, workspace, 5  #"Workspace 5"
bind = $mainMod, 6, workspace, 6  #"Workspace 6"
bind = $mainMod, 7, workspace, 7  #"Workspace 7"
bind = $mainMod, 8, workspace, 8  #"Workspace 8"
bind = $mainMod, 9, workspace, 9  #"Workspace 9"
bind = $mainMod, 0, workspace, 10 #"Workspace 10"

bind = $mainMod SHIFT, 1, movetoworkspace, 1  #"Mover para Workspace 1"
bind = $mainMod SHIFT, 2, movetoworkspace, 2  #"Mover para Workspace 2"
bind = $mainMod SHIFT, 3, movetoworkspace, 3  #"Mover para Workspace 3"
bind = $mainMod SHIFT, 4, movetoworkspace, 4  #"Mover para Workspace 4"
bind = $mainMod SHIFT, 5, movetoworkspace, 5  #"Mover para Workspace 5"
bind = $mainMod SHIFT, 6, movetoworkspace, 6  #"Mover para Workspace 6"
bind = $mainMod SHIFT, 7, movetoworkspace, 7  #"Mover para Workspace 7"
bind = $mainMod SHIFT, 8, movetoworkspace, 8  #"Mover para Workspace 8"
bind = $mainMod SHIFT, 9, movetoworkspace, 9  #"Mover para Workspace 9"
bind = $mainMod SHIFT, 0, movetoworkspace, 10 #"Mover para Workspace 10"

bind = $mainMod,       MINUS, togglespecialworkspace, magic  #"Toggle Magic"
bind = $mainMod SHIFT, MINUS, movetoworkspace, special:magic #"Mover para Magic"
bind = $mainMod CTRL,  MINUS, movetoworkspace, e+0           #"Resgatar do Magic"

bind = $mainMod, mouse_down, workspace, e+1  #"Próximo Workspace"
bind = $mainMod, mouse_up,   workspace, e-1  #"Workspace Anterior"

# ═══════════════════════════════════════════════════════════════════════════
#  SPECIAL WORKSPACES
# ═══════════════════════════════════════════════════════════════════════════
workspace = special:terminal, on-created-empty:[float; size 1280 720] $terminal --class kitty-scratchpad, persistent:false
workspace = special:magic, persistent:false

# ═══════════════════════════════════════════════════════════════════════════
#  REGRAS DE JANELAS
# ═══════════════════════════════════════════════════════════════════════════

windowrule = match:class ^(kitty-scratchpad)$, workspace special:terminal

# ─────────────────────────────────────────────────────────────────────────────
#  Diálogos Genéricos
# ─────────────────────────────────────────────────────────────────────────────
windowrule = match:title ^(Open File)$,   float on, center on
windowrule = match:title ^(Save As)$,     float on, center on
windowrule = match:title ^(File Upload)$, float on, center on

# ─────────────────────────────────────────────────────────────────────────────
#  Firefox
# ─────────────────────────────────────────────────────────────────────────────
windowrule = match:class ^(firefox)$ match:title ^(Firefox — Sharing Indicator)$, float on
windowrule = match:class ^(firefox)$ match:title ^(About Mozilla Firefox)$,       float on, center on

# ─────────────────────────────────────────────────────────────────────────────
#  Thunar
# ─────────────────────────────────────────────────────────────────────────────
windowrule = match:class ([Tt]hunar) match:title negative:(.*[Tt]hunar.*), float on, center on
windowrule = match:class ^(thunar)$ match:title ^(Confirm to replace files)$, float on, center on

# ─────────────────────────────────────────────────────────────────────────────
#  Float Popups
# ─────────────────────────────────────────────────────────────────────────────
windowrule = match:class ^(com.heroicgameslauncher.hgl)$ match:title negative:(Heroic Games Launcher), float on
windowrule = match:class ^([Ss]team)$ match:title negative:^([Ss]team)$, float on

# ─────────────────────────────────────────────────────────────────────────────
#  Vesktop / Discord
# ─────────────────────────────────────────────────────────────────────────────
windowrule = match:class ^(vesktop)$ match:title ^(Discord Popout)$,            float on, center on
windowrule = match:class ^(vesktop)$ match:title ^(Discord Sharing Indicator)$, float on

# ─────────────────────────────────────────────────────────────────────────────
#  Utilitários
# ─────────────────────────────────────────────────────────────────────────────
windowrule = match:class ^(pavucontrol)$,          float on, center on, size 700 450
windowrule = match:class ^(nm-connection-editor)$, float on, center on
windowrule = match:class ^(blueman-manager)$,      float on, center on, size 600 400

# ─────────────────────────────────────────────────────────────────────────────
#  Picture-in-Picture
# ─────────────────────────────────────────────────────────────────────────────
windowrule {
    name = Picture-in-Picture
    match:title = ^(Picture-in-Picture)$
    float = on
    move = 72% 7%
    opacity = 0.95 0.75
    pin = on
    keep_aspect_ratio = on
    size = (monitor_w*0.3) (monitor_h*0.3)
}

# ─────────────────────────────────────────────────────────────────────────────
#  Thunar Progress Bar
# ─────────────────────────────────────────────────────────────────────────────
windowrule {
    name = Thunar-Progress-bar
    match:class = ^(thunar)$
    match:title = ^(File Operation Progress)$
    float = on
    center = on
    size = (monitor_w*0.26) (monitor_h*0.18)
}
